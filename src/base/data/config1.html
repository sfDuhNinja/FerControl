<div class="subhead">Wi-Fi</div>

<form id="wifiForm">
    <label class="formLabel" for="wnl">Network</label>
    <input type="text" id="s" name="s" maxlength="32" autocomplete="off" style="display:none;" />

    <select id="wnl" class="field">
        <option>Searching networks…</option>
    </select>

    <label class="formLabel" for="p">Password</label>
    <input type="password" id="p" name="p" maxlength="64" class="field" placeholder="optional" autocomplete="off" />

    <label class="formLabel" for="h">Hostname</label>
    <input type="text" id="h" name="h" maxlength="24" class="field" style="margin-bottom:6px;" />

    <div class="rowBetween">
        <span style="font-size:13.5px; color:var(--text-dim);">Static IP</span>
        <input type="checkbox" id="staticip" name="staticip" class="toggleCheckbox">
    </div>

    <div id="staticIpGroup" style="display:none;">
        <div class="grid2gap10" style="margin-top:4px;">
            <div>
                <label class="formLabelSm" for="ip">IP</label>
                <input type="text" id="ip" name="ip" class="fieldSm"
                    pattern="((^|\.)((25[0-5])|(2[0-4]\d)|(1\d\d)|([1-9]?\d))){4}$">
            </div>
            <div>
                <label class="formLabelSm" for="gw">Gateway</label>
                <input type="text" id="gw" name="gw" class="fieldSm"
                    pattern="((^|\.)((25[0-5])|(2[0-4]\d)|(1\d\d)|([1-9]?\d))){4}$">
            </div>
            <div>
                <label class="formLabelSm" for="mask">Netmask</label>
                <input type="text" id="mask" name="mask" class="fieldSm"
                    pattern="((^|\.)((25[0-5])|(2[0-4]\d)|(1\d\d)|([1-9]?\d))){4}$">
            </div>
            <div>
                <label class="formLabelSm" for="dns1">DNS 1</label>
                <input type="text" id="dns1" name="dns1" class="fieldSm"
                    pattern="((^|\.)((25[0-5])|(2[0-4]\d)|(1\d\d)|([1-9]?\d))){4}$">
            </div>
            <div>
                <label class="formLabelSm" for="dns2">DNS 2</label>
                <input type="text" id="dns2" name="dns2" class="fieldSm"
                    pattern="((^|\.)((25[0-5])|(2[0-4]\d)|(1\d\d)|([1-9]?\d))){4}$">
            </div>
        </div>
    </div>

    <button type="submit" class="btnPrimary" id="saveWifiBtn" style="margin-top:16px;" disabled>Save Wi-Fi</button>
</form>
<div id="wifiResult" style="margin-top:10px; font-size:13px;"></div>

<script>
    // qsp is substituted at build time by pio_pre_build_spa.py

    $(qsp + '#staticip').addEventListener('change', function () {
        const on = $(qsp + '#staticip').checked;
        $(qsp + '#ip').required = on;
        $(qsp + '#staticIpGroup').style.display = on ? '' : 'none';
    });

    $(qsp + '#wifiForm').addEventListener('submit', function (event) {
        event.preventDefault();
        if (!$(qsp + '#staticip').checked) {
            ['#ip', '#gw', '#mask', '#dns1', '#dns2'].forEach(function (id) { $(qsp + id).value = ''; });
        }
        $(qsp + '#wifiResult').innerHTML = 'Saving configuration…';
        post("/sc" + qsp[8],
            convertFormToJson($(qsp + '#wifiForm')),
            function () {
                $(qsp + '#wifiForm').style.display = 'none';

                let targetUrl = '';
                if (!$(qsp + '#s').value) targetUrl = 'http://192.168.4.1';
                else if ($(qsp + '#staticip').checked && $(qsp + '#ip').value != '0.0.0.0') targetUrl = 'http://' + $(qsp + '#ip').value;
                else targetUrl = location.origin;

                $(qsp + '#wifiResult').innerHTML = '<b>Configuration saved successfully.</b> System is restarting now. Waiting for device… <span id="cd">0</span>s';
                redirectWhenReachable(targetUrl, 30000);
            },
            function () {
                $(qsp + '#wifiResult').innerHTML = '<span style="color:var(--danger);"><b>Error</b></span> saving configuration.';
            }
        );
    });

    function getNetworkList() {
        getJSON('/wnl', function (WNL) {
            if (WNL.r == -2 || WNL.r == -1) {
                setTimeout(getNetworkList, 2000);
                return;
            }
            const wnl = $(qsp + '#wnl');
            if (!wnl) return;
            if (WNL.r == 0) {
                wnl.innerHTML = '<option>No network found</option>';
                return;
            }
            wnl.innerHTML = '<option>Nearby networks…</option>';
            for (const k in WNL.wnl) {
                const color = rssiToColor(WNL.wnl[k].RSSI);
                wnl.innerHTML += `<option style="color:${color}" value="${WNL.wnl[k].SSID}"${$(qsp + '#s').value == WNL.wnl[k].SSID ? ' selected' : ''}>${WNL.wnl[k].SSID} (${rssiToQuality(WNL.wnl[k].RSSI)}%)</option>`;
            }
            wnl.addEventListener('change', function () { $(qsp + '#s').value = wnl.value; });
        });
    }

    onSectionOpen('Config', function () {
        getJSON('/gc' + qsp[8],
            function (GC) {
                for (const k in GC) {
                    const el = $(qsp + '#' + k);
                    if (!el) continue;
                    if (el.type != 'checkbox') el.value = GC[k];
                    else el.checked = GC[k];
                    triggerEvent(el, 'change');
                }

                if ($(qsp + '#ip').value) {
                    $(qsp + '#staticip').checked = true;
                    triggerEvent($(qsp + '#staticip'), 'change');
                }

                $(qsp + '#saveWifiBtn').disabled = false;
                getNetworkList();
            },
            function () {
                $(qsp + '#wifiResult').innerHTML = '<span style="color:var(--danger);">Failed to load Wi-Fi configuration</span>';
            }
        );
    });
</script>
