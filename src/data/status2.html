<div class="hairlineTop">
    <div class="subhead">Stove</div>
    <div class="kvGrid">
        <div class="kvRow"><span>Status</span><span id="appStoveStatus">—</span></div>
        <div class="kvRow"><span>Feeder</span><span class="mono" id="appStoveFdr">—</span></div>
    </div>
</div>

<button class="linkBtn" id="rawToggleBtn" style="margin-top:20px;">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" class="chev" id="rawChev">
        <path d="M6 9l6 6 6-6" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    Raw data
</button>
<div class="rawWrap" id="rawWrap">
    <div class="rawGrid" id="rawGrid"></div>
</div>

<script>
    // qsp is substituted at build time by pio_pre_build_spa.py

    let raw = {};
    let rawOpen = false;

    function renderRawGrid() {
        const rows = Object.keys(raw).map(function (k) {
            return '<div class="rawRow"><span>' + k + '</span><span>' + raw[k] + '</span></div>';
        }).join('');
        $(qsp + '#rawGrid').innerHTML = rows;
    }

    // Mirrors the STATUS_Text mapping used for the Home Assistant sensor (WPalaControl.cpp),
    // kept in sync manually since one lives as a Jinja template and the other as JS.
    const STATUS_TEXT = {
        0: 'Off', 1: 'Off Timer', 2: 'Test Fire', 3: 'Ignition', 4: 'Ignition', 5: 'Ignition',
        6: 'Burning', 9: 'Cool', 10: 'Fire Stop', 11: 'Clean Fire', 12: 'Cool',
        239: 'MFDoor Alarm', 240: 'Fire Error', 241: 'Chimney Alarm', 243: 'Grate Error',
        244: 'NTC2 Alarm', 245: 'NTC3 Alarm', 247: 'Door Alarm', 248: 'Pressure Alarm',
        249: 'NTC1 Alarm', 250: 'TC1 Alarm', 252: 'Gas Alarm', 253: 'No Pellet Alarm'
    };

    function updateDerivedRows() {
        if (raw.STATUS !== undefined) {
            const code = parseInt(raw.STATUS);
            $(qsp + '#appStoveStatus').textContent = STATUS_TEXT[code] || ('Unknown STATUS code ' + code);
        }
        if (raw.FDR !== undefined) $(qsp + '#appStoveFdr').textContent = parseFloat(raw.FDR).toFixed(1) + 's';
    }

    function mergeRaw(partial) {
        Object.assign(raw, partial);
        WPC.updateRaw(partial);
        renderRawGrid();
        updateDerivedRows();
    }

    $(qsp + '#rawToggleBtn').addEventListener('click', function () {
        rawOpen = !rawOpen;
        $(qsp + '#rawWrap').classList.toggle('open', rawOpen);
        $(qsp + '#rawChev').classList.toggle('open', rawOpen);
    });

    onSectionOpen('Status', async function () {
        // Home Automation connectivity info
        getJSON("/gs" + qsp[8], function (GS) {
            WPC.setHaStatus({ protocol: GS.haprotocol, mqttStatus: GS.hamqttstatus });
        });

        if (!!window.EventSource && (typeof statusEventSource === 'undefined' || statusEventSource.readyState === 2)) {
            var statusEventSource = new EventSource('/statusEvt' + qsp[8]);
            statusEventSource.addEventListener('message', function (e) {
                mergeRaw(JSON.parse(e.data));
            });
        }

        // Seed the raw stove data instantly instead of waiting for the next periodic publish.
        // STAT/TMPS/FAND/CNTR/TIME/SETP/POWR/DPRS are the same set publishTick() runs on the
        // device, so a missed request here just gets backfilled by the next SSE tick.
        // Sent one at a time (not Promise.all): the device is a single-threaded ESP8266 web
        // server with a very small TCP connection budget, so firing all requests concurrently
        // can exhaust its sockets and cause failed/reset connections. Sequential requests keep
        // at most one extra connection open on top of the SSE stream.
        const cmds = ['STAT', 'TMPS', 'FAND', 'CNTR', 'TIME', 'SETP', 'POWR', 'DPRS'];
        for (const cmd of cmds) {
            try {
                const res = await fetch('/cgi-bin/sendmsg.lua?cmd=GET+' + cmd).then(function (r) { return r.json(); });
                if (res && res.SUCCESS && res.DATA) mergeRaw(res.DATA);
            } catch (e) {
                // fall through - the next SSE tick backfills it
            }
        }
    });
</script>
